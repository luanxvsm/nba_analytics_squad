collect_data:
  description: >
    Colete dados dos últimos 5 jogos da NBA e as estatísticas detalhadas
    dos jogadores que mais se destacaram nesses jogos. Use as ferramentas
    disponíveis para buscar:
    1. Lista dos jogos mais recentes com placares e times envolvidos.
    2. Estatísticas individuais (box score) dos jogadores de destaque.
    Retorne todos os dados em formato estruturado (tabular/JSON) para
    que o analista possa processá-los.
  expected_output: >
    Dados brutos estruturados contendo: lista de jogos recentes com
    times, placares e datas; e estatísticas individuais dos principais
    jogadores incluindo PTS, REB, AST, FGM, FGA, FG3M, FTA, FTM, STL,
    BLK, TOV e MIN.

analyze_data:
  description: >
    Com base nos dados brutos coletados, realize as seguintes etapas:
    1. Limpe e normalize os dados (tratar valores ausentes, tipos corretos).
    2. Calcule as seguintes métricas avançadas para cada jogador:
       - TS% (True Shooting %) = PTS / (2 × (FGA + 0.44 × FTA))
       - eFG% (Effective FG %) = (FGM + 0.5 × FG3M) / FGA
       - AST/TO Ratio = AST / TOV (tratar divisão por zero)
       - PIE simplificado = (PTS + FGM + FTM - FGA - FTA + DREB + 0.5×OREB
         + AST + STL + 0.5×BLK - TOV) / fator de jogo
    3. Classifique os jogadores por eficiência geral.
    4. Identifique os top 5 performers e tendências notáveis.
    Apresente os resultados em formato tabular claro.
  expected_output: >
    Análise completa com: tabela de jogadores com todas as métricas
    avançadas calculadas; ranking dos top 5 performers; e pelo menos
    2 insights/tendências identificadas nos dados.

write_report:
  description: >
    Com base na análise estatística fornecida, escreva um boletim
    informativo profissional em Markdown puro seguindo esta estrutura:

    # 🏀 NBA Analytics Report — [data atual]
    ## Resumo Executivo
    (Parágrafo conciso com os principais destaques)
    ## Destaques dos Jogos Recentes
    (Resumo dos jogos com placares e momentos-chave)
    ## Top Performers — Métricas Avançadas
    (Tabela Markdown com Jogador | PTS | TS% | eFG% | AST/TO | PIE)
    ## Análise de Tendências
    (Insights identificados pelo analista, expandidos com contexto)
    ## Metodologia
    (Breve explicação das métricas utilizadas)

    O tom deve ser profissional mas acessível. Use emojis com moderação
    para tornar o relatório mais visual.
  expected_output: >
    Boletim informativo completo em Markdown puro, com todas as seções
    preenchidas, tabelas formatadas corretamente e pronto para publicação.
    O arquivo deve ser salvo como report.md.
